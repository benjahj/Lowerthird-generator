# Bygger Windows-installer + macOS-DMG og lægger dem på GitHub Releases.
# Udløses ved push af et version-tag (v1.2.3) eller manuelt fra Actions-fanen.
name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx electron-builder --win nsis --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx electron-builder --mac dmg --universal --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # usigneret build — signering kræver Apple Developer-konto
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

  # versionsskema: 1.X.0 = stable (auto-update til alle),
  # 1.X.Y (Y>0) = beta → markeres som pre-release, som installerede apps ignorerer
  flag-beta:
    needs: [windows, mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mark beta builds as pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER=$(node -p "require('./package.json').version")
          PATCH=${VER##*.}
          if [ "$PATCH" != "0" ]; then
            gh release edit "v$VER" --prerelease --repo "$GITHUB_REPOSITORY"
            echo "v$VER markeret som pre-release (beta)"
          else
            echo "v$VER er en stable release"
          fi
