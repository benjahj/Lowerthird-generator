# Bygger Windows-installer + macOS-DMG og lægger dem på GitHub Releases.
# Udløses ved push af et version-tag (v1.2.3) eller manuelt fra Actions-fanen.
name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx electron-builder --win nsis --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx electron-builder --mac dmg --universal --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # usigneret build — signering kræver Apple Developer-konto
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
